---
<!-- var: site.pages[2] -->
title: "{{ site.pages[2].title }}"
permalink: "{{ site.pages[2].url }}"
---
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ var.title }}</title>
    <link rel="icon" type="image/png" sizes="192x192" href="{{ site.baseurl }}{{ site.icon }}">
    <link rel="stylesheet" href="{{ site.baseurl }}/_style/blog.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    {% assign page_data = site.pages[2] %}
    <!-- navbar -->
    {% include "_html/_components/navbar.html" %}

    <main>
        <section class="section active">
            <div class="hero">
                <h1 class="title">{{ page_data.title }}</h1>
                <p class="caption">{{ page_data.caption }}</p>
            </div>

            <div class="blog-grid">
                <!-- Blog cards will be generated dynamically -->
            </div>
        </section>
    </main>

    {% include "_html/_components/footer.html" %}

    <script>
        // Inject blog data from YAML
        window.blogData = {{ blog.cards | json }};
    </script>
    <script src="{{ site.baseurl }}/_scripts/blog.js"></script>
    <script src="{{ site.baseurl }}/_scripts/_components/theme.js"></script>
    <script src="{{ site.baseurl }}/_scripts/_components/scroll-top.js"></script>
    <script src="{{ site.baseurl }}/_scripts/_components/hamburger.js"></script>
    <script src="{{ site.baseurl }}/_scripts/global.js"></script>

</body>

</html>
